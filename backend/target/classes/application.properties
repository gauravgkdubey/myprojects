# Ollama service URL can also be overridden via environment variable OLLAMA_URL
ollama.url=http://localhost:11434/v1/chat/completions

# Ollama models endpoint URL for discovery
ollama.models.url=http://localhost:11434/v1/models

# Ollama model can be overridden via environment variable OLLAMA_MODEL
# Set this to a model installed in your local Ollama instance (run `ollama list` to see available models).
ollama.model=llama3
